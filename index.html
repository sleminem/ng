<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属导航库</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏样式 */
        .sidebar {
            width: 210px;
            background-color: var(--card-bg);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            padding: 20px 0;
            box-shadow: 2px 0 8px rgba(0,0,0,0.04);
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar::-webkit-scrollbar {
            width: 5px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background-color: #E5E7EB;
            border-radius: 3px;
        }

        .sidebar h2 {
            padding: 0 20px 15px;
            font-size: 1.1rem;
            color: var(--primary-color);
            border-bottom: 1px solid #F3F4F6;
            margin-bottom: 8px;
        }

        .nav-item {
            display: block;
            padding: 11px 20px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .nav-item:hover {
            background-color: #EEF2FF;
            color: var(--primary-color);
            border-right: 3px solid var(--primary-color);
        }

        /* 主内容区样式 */
        .main-content {
            flex: 1;
            margin-left: 210px;
            padding: 25px 35px;
        }

        .category-section {
            margin-bottom: 30px;
            scroll-margin-top: 15px;
        }

        .category-title {
            font-size: 1.25rem;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #E5E7EB;
            color: #111827;
            font-weight: 600;
        }

        /* 舒适网格 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 14px;
        }

        /* 舒适卡片样式：关键改动 align-items: center */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 12px 14px;
            text-decoration: none;
            border: 1px solid #E5E7EB;
            transition: all 0.2s ease;
            display: flex;
            align-items: center; /* 完美上下居中对齐 */
            overflow: hidden;
            height: 68px; /* 固定高度保证整齐 */
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px -2px rgba(0, 0, 0, 0.08);
            border-color: var(--primary-color);
        }

        .card-icon {
            width: 22px;
            height: 22px;
            margin-right: 10px;
            flex-shrink: 0;
            border-radius: 4px;
            object-fit: cover;
            background-color: #F9FAFB;
        }

        .card-info {
            flex: 1;
            min-width: 0;
        }

        .card h3 {
            font-size: 0.92rem;
            color: var(--text-main);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }

        .card:hover h3 {
            color: var(--primary-color);
        }

        .card p {
            font-size: 0.78rem;
            color: var(--text-muted);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                box-shadow: none;
                border-bottom: 1px solid #E5E7EB;
                display: flex;
                flex-wrap: wrap;
                padding: 10px;
            }
            .sidebar h2 { width: 100%; border: none; padding: 5px; margin-bottom: 0; }
            .nav-item { padding: 6px 12px; margin: 4px; background: #fff; border-radius: 15px; border: 1px solid #eee; font-size: 0.85rem;}
            .main-content { margin-left: 0; padding: 20px; }
            .grid-container { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
        }
    </style>
</head>

        const categoryMap = {
            'ai': '🤖 AI 通用',
            'AIagent': '🧠 AI Agent',
            'social': '💬 社交媒体',
            'TBtools': '🧰 TB 工具',
            'tools': '⚡ 工具提效',
            'news': '📰 新闻资讯',
            'design': '🎨 设计资源',
            'general': '📐 通用设计',
            'education': '📚 教育平台',
            'business': '💼 商务资源',
            'other': '🌈 其他'
        };

        const groupedSites = sites.reduce((acc, site) => {
            if (!acc[site.category]) acc[site.category] = [];
            acc[site.category].push(site);
            return acc;
        }, {});

        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');

        function getDomain(url) {
            try { return new URL(url).hostname; } catch (e) { return ''; }
        }

        for (const [categoryKey, sitesArray] of Object.entries(groupedSites)) {
            const categoryName = categoryMap[categoryKey] || categoryKey;
            const sectionId = `cat-${categoryKey}`;

            const navLink = document.createElement('a');
            navLink.href = `#${sectionId}`;
            navLink.className = 'nav-item';
            navLink.textContent = categoryName;
            sidebar.appendChild(navLink);

            const section = document.createElement('div');
            section.className = 'category-section';
            section.id = sectionId;

            const title = document.createElement('h2');
            title.className = 'category-title';
            title.textContent = categoryName;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'grid-container';

            sitesArray.forEach(site => {
                const domain = getDomain(site.url);
                const iconUrl = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=32` : '';

                const card = document.createElement('a');
                card.href = site.url;
                card.target = '_blank';
                card.className = 'card';
                card.innerHTML = `
                    <img class="card-icon" src="${iconUrl}" alt="icon" loading="lazy" onerror="this.style.display='none'">
                    <div class="card-info">
                        <h3 title="${site.name}">${site.name}</h3>
                        <p title="${site.desc}">${site.desc}</p>
                    </div>
                `;
                grid.appendChild(card);
            });

            section.appendChild(grid);
            mainContent.appendChild(section);
        }
